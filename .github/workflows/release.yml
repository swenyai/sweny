name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          npm run build --workspace=packages/core
          npm run build:lib --workspace=packages/studio
          npm run build --workspace=packages/mcp

      - name: Test
        run: npm run test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'release-*' 2>/dev/null || echo "")
          DIFF_BASE=${LAST_TAG:-$(git rev-list --max-parents=0 HEAD)}

          CHANGED_CORE=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/core/ | head -1)
          CHANGED_STUDIO=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/studio/ | head -1)
          CHANGED_MCP=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/mcp/ | head -1)

          PUBLISHED=false

          if [ -n "$CHANGED_CORE" ]; then
            cd packages/core
            LOCAL_VER=$(node -p "require('./package.json').version")
            NPM_VER=$(npm view @sweny-ai/core version 2>/dev/null || echo "0.0.0")

            if [ "$LOCAL_VER" = "$NPM_VER" ]; then
              NEXT=$(echo "$LOCAL_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
              npm version "$NEXT" --no-git-tag-version
            fi

            npm publish
            PUBLISHED=true
            echo "Published @sweny-ai/core@$(node -p "require('./package.json').version")"
            cd ../..
          fi

          if [ -n "$CHANGED_STUDIO" ]; then
            cd packages/studio
            LOCAL_VER=$(node -p "require('./package.json').version")
            NPM_VER=$(npm view @sweny-ai/studio version 2>/dev/null || echo "0.0.0")

            if [ "$LOCAL_VER" = "$NPM_VER" ]; then
              NEXT=$(echo "$LOCAL_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
              npm version "$NEXT" --no-git-tag-version
            fi

            npm publish
            PUBLISHED=true
            echo "Published @sweny-ai/studio@$(node -p "require('./package.json').version")"
            cd ../..
          fi

          if [ -n "$CHANGED_MCP" ]; then
            cd packages/mcp
            LOCAL_VER=$(node -p "require('./package.json').version")
            NPM_VER=$(npm view @sweny-ai/mcp version 2>/dev/null || echo "0.0.0")

            if [ "$LOCAL_VER" = "$NPM_VER" ]; then
              NEXT=$(echo "$LOCAL_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
              npm version "$NEXT" --no-git-tag-version
            fi

            npm publish
            PUBLISHED=true
            echo "Published @sweny-ai/mcp@$(node -p "require('./package.json').version")"
            cd ../..
          fi

          if [ "$PUBLISHED" = true ]; then
            git add -A
            git commit -m "chore: release packages [skip ci]"
            git push
          fi

      - name: Tag v5 moving tag and immutable v5.<core-version>
        run: |
          # The root action.yml is a composite action — no JS bundle to build.
          # Just move the v5 tag forward so consumers pinned to swenyai/sweny@v5
          # always get the latest engine wrapper, and cut an immutable
          # v5.<core_version> for anyone who wants to pin precisely.
          git tag -f v5
          git push origin v5 --force

          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          VERSIONED_TAG="v5.${CORE_VERSION}"
          if git tag "$VERSIONED_TAG" 2>/dev/null; then
            git push origin "$VERSIONED_TAG"
            echo "Pushed $VERSIONED_TAG"
          fi

          git tag -f "release-latest"
          git push origin "release-latest" --force
