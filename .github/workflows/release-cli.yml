name: Release @sweny-ai/cli

on:
  push:
    tags:
      - "cli-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build providers (dependency)
        run: npm run build --workspace=packages/providers

      - name: Build engine (dependency)
        run: npm run build --workspace=packages/engine

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Typecheck
        run: npm run typecheck --workspace=packages/cli

      - name: Publish
        run: npm publish --access public --workspace=packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
