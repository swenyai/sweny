name: Auto Changeset

on:
  push:
    branches: [main]
    paths:
      - "packages/engine/src/**"
      - "packages/studio/src/**"
      - "packages/cli/src/**"
      - "packages/providers/src/**"
      - "packages/agent/src/**"

concurrency:
  group: auto-changeset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-changeset:
    name: Generate missing changeset
    runs-on: ubuntu-latest
    # Skip if this commit is itself a changeset or release commit (prevent loops)
    if: |
      !startsWith(github.event.head_commit.message, 'chore: release packages') &&
      !startsWith(github.event.head_commit.message, 'chore: add changesets') &&
      !startsWith(github.event.head_commit.message, 'chore(changeset)')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run auto-changeset script
        id: changeset
        run: |
          OUTPUT=$(node scripts/auto-changeset.mjs 2>&1)
          echo "$OUTPUT"
          # Extract the created file path from the "Created: <path>" line
          CREATED=$(echo "$OUTPUT" | grep '^Created:' | sed 's/^Created: //')
          if [ -n "$CREATED" ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "file=$CREATED" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with changeset
        if: steps.changeset.outputs.created == 'true'
        run: |
          BRANCH="auto-changeset/${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .changeset/
          git commit -m "chore(changeset): auto-generate changeset for ${{ github.sha }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(changeset): auto-generated changeset" \
            --body "Auto-generated changeset for commits since last release. Review the bump level and description, then merge to include in the next release." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
