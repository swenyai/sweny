name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the version-bump commit triggers CI on re-push.
          # Falls back to GITHUB_TOKEN (version-bump won't re-trigger CI, but publish still works).
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build packages
        run: |
          npm run build --workspace=packages/providers
          npm run build --workspace=packages/engine
          npm run build --workspace=packages/cli

      - name: Test
        run: npm run test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Consume changesets — bump versions
        id: version
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv README; then
            npx changeset version
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push version bumps
        if: steps.version.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "chore: release packages [skip ci]"
          git push

      - name: Publish to npm
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rebuild action dist and update v3 tag
        run: |
          npm run package --workspace=packages/action
          git add dist/
          if git diff --cached --quiet; then
            echo "dist unchanged, skipping commit"
          else
            git commit -m "chore: rebuild action dist [skip ci]"
            git push
          fi
          # Keep the v3 floating tag pointing at the latest main commit
          git tag -f v3
          git push origin v3 --force
