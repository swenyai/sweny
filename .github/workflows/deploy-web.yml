name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/studio/src/**"
      - "packages/studio/package.json"
      - "packages/studio/vite.lib.config.ts"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed for Starlight lastUpdated

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build core (required for studio type declarations)
        run: npm run build --workspace=packages/core

      - name: Build studio library
        run: npm run build:lib --workspace=packages/studio

      - name: Build site
        run: npm run build --workspace=packages/web
        env:
          GITHUB_PAGES: true
          VITE_GIT_COMMIT_SHA: ${{ github.sha }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
