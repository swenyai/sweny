name: "SWEny — Run AI Workflow"
description: "Run any SWEny workflow YAML on GitHub Actions. See also swenyai/triage and swenyai/e2e."
author: "SWEny"

branding:
  icon: "play"
  color: "orange"

inputs:
  workflow:
    description: "Path to the workflow YAML file to execute (relative to working-directory)."
    required: true

  claude-oauth-token:
    description: "Claude Code OAuth token. Use this OR anthropic-api-key. OAuth tokens do not consume API credit."
    required: false
  anthropic-api-key:
    description: "Anthropic API key for Claude. Use this OR claude-oauth-token."
    required: false

  cli-version:
    description: "Version of @sweny-ai/core to install (the package that ships the `sweny` CLI). Defaults to latest."
    required: false
    default: "latest"

  node-version:
    description: "Node.js version to install."
    required: false
    default: "24"

  working-directory:
    description: "Working directory to run the workflow from. Defaults to the repository root."
    required: false
    default: "."

  dry-run:
    description: "When 'true', execute until the first conditional routing decision and stop. Validates the workflow end-to-end without triggering downstream actions."
    required: false
    default: "false"

  verbose:
    description: "When 'true', print each tool call's input and output inline. Truncated for readability; use the CLI's --stream flag locally for full untruncated NDJSON. Helpful for debugging a node that halts or fails."
    required: false
    default: "false"

  input:
    description: |
      JSON object of per-run inputs for the workflow. Forwarded verbatim to
      `sweny workflow run --input '<json>'`. When the workflow declares an
      `inputs` block, the CLI validates this string against the declaration
      (type-check, required-field check, default-fill) and fails with a
      readable diff when the shape doesn't match. When the workflow does NOT
      declare `inputs`, the JSON is passed through unchanged for back-compat.

      Example (release-notes-style):
        input: |
          {
            "since_tag": "v1.41.12",
            "until_tag": "v1.41.13",
            "draft": true
          }
    required: false
    default: ""

  cloud-token:
    description: "SWEny Cloud project token (sweny_pk_...) for reporting run results to cloud.sweny.ai. Optional. Equivalent to setting the SWENY_CLOUD_TOKEN env var; either form is accepted."
    required: false

runs:
  using: "composite"
  steps:
    - name: Validate auth inputs
      shell: bash
      env:
        HAS_OAUTH: ${{ inputs.claude-oauth-token != '' }}
        HAS_API_KEY: ${{ inputs.anthropic-api-key != '' }}
      run: |
        if [ "$HAS_OAUTH" != "true" ] && [ "$HAS_API_KEY" != "true" ]; then
          echo "::error::Either claude-oauth-token or anthropic-api-key must be provided"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install SWEny CLI
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
      run: npm install -g "@sweny-ai/core@${CLI_VERSION}"

    - name: Run workflow
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-oauth-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        WORKFLOW_PATH: ${{ inputs.workflow }}
        DRY_RUN: ${{ inputs.dry-run }}
        VERBOSE: ${{ inputs.verbose }}
        WORKFLOW_INPUT: ${{ inputs.input }}
        INPUT_CLOUD_TOKEN: ${{ inputs.cloud-token }}
      run: |
        # Forward the cloud token to the CLI. Prefer the explicit `cloud-token`
        # input; otherwise honor whatever the caller put on the step env as
        # SWENY_CLOUD_TOKEN. Never overwrite a non-empty inherited value with
        # an empty input.
        if [ -n "$INPUT_CLOUD_TOKEN" ]; then
          export SWENY_CLOUD_TOKEN="$INPUT_CLOUD_TOKEN"
        fi
        # Normalize boolean-ish inputs (true / TRUE / 1 / yes).
        normalize() {
          local v
          v=$(echo "${1:-false}" | tr '[:upper:]' '[:lower:]')
          case "$v" in true|1|yes) echo "true" ;; *) echo "false" ;; esac
        }
        DRY_NORM=$(normalize "$DRY_RUN")
        VERBOSE_NORM=$(normalize "$VERBOSE")

        FLAGS=()
        [ "$DRY_NORM" = "true" ] && FLAGS+=("--dry-run")
        [ "$VERBOSE_NORM" = "true" ] && FLAGS+=("--verbose")
        # Forward per-run inputs verbatim. Pass through env to avoid shell
        # quoting issues with nested JSON; the CLI parses and validates the
        # string against the workflow's declared `inputs` block (if any) and
        # fails with a readable error when the shape doesn't match.
        if [ -n "$WORKFLOW_INPUT" ]; then
          FLAGS+=("--input" "$WORKFLOW_INPUT")
        fi

        sweny workflow run "$WORKFLOW_PATH" "${FLAGS[@]}"
