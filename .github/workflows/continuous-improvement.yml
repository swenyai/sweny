name: Continuous Improvement

# SWEny runs autonomously on this repo to investigate CI failures, improve
# code quality, and open fix PRs — demonstrating the full triage loop.
#
# This is real dogfooding: the tool that builds itself.

on:
  schedule:
    - cron: "0 7 * * 1,4" # Mon & Thu at 7 AM UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run — analyze only, no PRs or issues created"
        default: "false"
        required: false
      time-range:
        description: "How far back to look (e.g. 1h, 24h, 7d)"
        default: "7d"
        required: false
      investigation-depth:
        description: "Investigation depth (quick, standard, thorough)"
        default: "thorough"
        required: false

jobs:
  improve:
    name: Autonomous Improvement
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'schedule' || github.actor == 'wickdninja'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect CI failure logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'EOF'
          import subprocess, json, sys

          repo = "swenyai/sweny"

          result = subprocess.run(
            ["gh", "run", "list", "--repo", repo,
             "--status", "failure", "--limit", "30",
             "--json", "databaseId,name,createdAt,headBranch,workflowName"],
            capture_output=True, text=True,
          )
          runs = json.loads(result.stdout) if result.stdout.strip() else []
          print(f"Found {len(runs)} failed runs", flush=True)

          entries = []
          for run in runs:
            run_id   = str(run["databaseId"])
            job_name = run.get("name") or run.get("workflowName", "unknown")
            wf_name  = run.get("workflowName", job_name)
            created  = run["createdAt"]
            branch   = run.get("headBranch", "unknown")

            logs = subprocess.run(
              ["gh", "run", "view", run_id, "--repo", repo, "--log-failed"],
              capture_output=True, text=True,
            )
            lines = [l.strip() for l in logs.stdout.splitlines() if l.strip()]
            print(f"  run {run_id} ({wf_name}): {len(lines)} log lines", flush=True)

            for line in lines:
              if any(line.startswith(p) for p in ("##[debug]", "##[group]", "##[endgroup]")):
                continue
              entries.append({
                "timestamp": created,
                "service":   "sweny-ci",
                "level":     "error",
                "message":   f"[{wf_name} / {branch}] {line}",
                "attributes": {
                  "run_id":   run_id,
                  "workflow": wf_name,
                  "job":      job_name,
                  "branch":   branch,
                },
              })

          with open("/tmp/ci-logs.json", "w") as f:
            json.dump(entries, f, indent=2)

          print(f"Wrote {len(entries)} log entries from {len(runs)} failed runs", flush=True)
          EOF

      - name: Run SWEny
        uses: swenyai/sweny@v1
        with:
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Observability: our own CI failure logs
          observability-provider: file
          log-file-path: /tmp/ci-logs.json

          # Issue tracking: GitHub Issues on this repo
          issue-tracker-provider: github-issues
          # PAT required — github.token PRs are authored by github-actions[bot] which
          # GitHub blocks from triggering pull_request CI events.
          github-token: ${{ secrets.GH_PAT }}

          dry-run: ${{ inputs.dry-run || 'false' }}
          time-range: ${{ inputs.time-range || '7d' }}
          investigation-depth: ${{ inputs.investigation-depth || 'thorough' }}
          novelty-mode: "true"

          additional-instructions: |
            You are the autonomous improvement agent for the SWEny codebase itself.
            This is the repo that builds and ships SWEny — you are improving your own platform.

            Your primary inputs are CI failure logs, but your mandate is broader than just
            fixing broken builds. After addressing any CI failures, look at the codebase
            holistically and identify the highest-value improvement you can make:

            - Recurring CI failures: TypeScript errors, test failures, missing build steps
            - Test coverage gaps: providers or engine paths with no tests
            - Provider correctness: env var mappings, error handling, edge cases
            - Type safety: loose casts, missing types, `any` usage
            - Documentation gaps: inputs/outputs that are undocumented or misleading
            - Performance: slow build steps, redundant work in the action entrypoint

            The codebase is a TypeScript monorepo:
              packages/providers  — 30+ provider implementations (observability, issue tracking, etc.)
              packages/engine     — workflow runner (Learn → Act → Report)
              packages/action     — GitHub Action entrypoint (dist/index.js via ncc)
              packages/agent      — Slack bot + CLI AI assistant
              packages/cli        — sweny CLI (triage command)

            Prioritize a single high-confidence, well-scoped fix. Open a clean PR with a
            clear description so the team can review and merge it quickly.
