name: "SWEny — Run Workflow"
description: "Run any SWEny workflow YAML on GitHub Actions. Generic engine wrapper — bring your own workflow file."
author: "SWEny"

branding:
  icon: "play"
  color: "orange"

inputs:
  workflow:
    description: "Path to the workflow YAML file to execute (relative to working-directory)."
    required: true

  claude-oauth-token:
    description: "Claude Code OAuth token. Use this OR anthropic-api-key. OAuth tokens do not consume API credit."
    required: false
  anthropic-api-key:
    description: "Anthropic API key for Claude. Use this OR claude-oauth-token."
    required: false

  cli-version:
    description: "Version of @sweny-ai/core to install (the package that ships the `sweny` CLI). Defaults to latest."
    required: false
    default: "latest"

  node-version:
    description: "Node.js version to install."
    required: false
    default: "24"

  working-directory:
    description: "Working directory to run the workflow from. Defaults to the repository root."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Validate auth inputs
      shell: bash
      env:
        HAS_OAUTH: ${{ inputs.claude-oauth-token != '' }}
        HAS_API_KEY: ${{ inputs.anthropic-api-key != '' }}
      run: |
        if [ "$HAS_OAUTH" != "true" ] && [ "$HAS_API_KEY" != "true" ]; then
          echo "::error::Either claude-oauth-token or anthropic-api-key must be provided"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install SWEny CLI
      shell: bash
      run: npm install -g @sweny-ai/core@${{ inputs.cli-version }}

    - name: Run workflow
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-oauth-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: sweny workflow run "${{ inputs.workflow }}"
