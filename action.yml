name: "SWEny AI"
description: "Autonomous SRE triage — monitors logs, investigates issues, creates tickets, and opens fix PRs."
author: "SWEny"

branding:
  icon: "activity"
  color: "orange"

inputs:
  anthropic-api-key:
    description: "Anthropic API key for Claude (use this OR claude-oauth-token)"
    required: false
  claude-oauth-token:
    description: "Claude Code OAuth token (use this OR anthropic-api-key)"
    required: false

  # Coding agent provider
  coding-agent-provider:
    description: "Coding agent to use for implementation (claude, codex, gemini)"
    required: false
    default: "claude"

  # OpenAI credentials (when coding-agent-provider = codex)
  openai-api-key:
    description: "OpenAI API key (required when coding-agent-provider is codex)"
    required: false

  # Google credentials (when coding-agent-provider = gemini)
  gemini-api-key:
    description: "Google Gemini API key (required when coding-agent-provider is gemini)"
    required: false

  # Observability provider
  observability-provider:
    description: "Observability provider to use (datadog, sentry, cloudwatch, splunk, elastic, newrelic, loki, file)"
    required: false
    default: "datadog"

  # Datadog credentials
  dd-api-key:
    description: "Datadog API key"
    required: false
  dd-app-key:
    description: "Datadog Application key"
    required: false
  dd-site:
    description: "Datadog site (e.g., datadoghq.com, datadoghq.eu)"
    required: false
    default: "datadoghq.com"

  # Sentry credentials
  sentry-auth-token:
    description: "Sentry auth token"
    required: false
  sentry-org:
    description: "Sentry organization slug"
    required: false
  sentry-project:
    description: "Sentry project slug"
    required: false
  sentry-base-url:
    description: "Sentry base URL (default: https://sentry.io)"
    required: false
    default: "https://sentry.io"

  # CloudWatch credentials
  cloudwatch-region:
    description: "AWS region for CloudWatch Logs"
    required: false
    default: "us-east-1"
  cloudwatch-log-group-prefix:
    description: "CloudWatch log group name or prefix"
    required: false

  # Splunk credentials
  splunk-url:
    description: "Splunk REST API base URL (e.g., https://splunk.example.com:8089)"
    required: false
  splunk-token:
    description: "Splunk authentication token"
    required: false
  splunk-index:
    description: "Splunk index to search"
    required: false
    default: "main"

  # Elasticsearch credentials
  elastic-url:
    description: "Elasticsearch base URL (e.g., https://elastic.example.com:9200)"
    required: false
  elastic-api-key:
    description: "Elasticsearch API key"
    required: false
  elastic-index:
    description: "Elasticsearch index pattern"
    required: false
    default: "logs-*"

  # New Relic credentials
  newrelic-api-key:
    description: "New Relic API key (NRAK-...)"
    required: false
  newrelic-account-id:
    description: "New Relic account ID"
    required: false
  newrelic-region:
    description: "New Relic region (us or eu)"
    required: false
    default: "us"

  # Grafana Loki credentials
  loki-url:
    description: "Loki base URL (e.g., https://loki.example.com)"
    required: false
  loki-api-key:
    description: "Loki API key (optional)"
    required: false
  loki-org-id:
    description: "Loki tenant/org ID (optional)"
    required: false

  # File provider (when observability-provider = file)
  log-file-path:
    description: "Path to a local JSON log file (required when observability-provider is file)"
    required: false

  # Issue tracker provider
  issue-tracker-provider:
    description: "Issue tracker provider to use (github-issues, linear, jira)"
    required: false
    default: "github-issues"
  linear-api-key:
    description: "Linear API key"
    required: false
  linear-team-id:
    description: "Linear team UUID"
    required: false
  linear-bug-label-id:
    description: "Linear label UUID for bugs"
    required: false
  linear-triage-label-id:
    description: "Linear label UUID for agent-triage issues"
    required: false
  linear-state-backlog:
    description: "Linear workflow state UUID for Backlog"
    required: false
  linear-state-in-progress:
    description: "Linear workflow state UUID for In Progress"
    required: false
  linear-state-peer-review:
    description: "Linear workflow state UUID for Peer Review"
    required: false

  # Jira credentials (when issue-tracker-provider = jira)
  jira-base-url:
    description: "Jira base URL (e.g., https://myco.atlassian.net)"
    required: false
  jira-email:
    description: "Jira user email for API authentication"
    required: false
  jira-api-token:
    description: "Jira API token"
    required: false

  # Source control provider
  source-control-provider:
    description: "Source control provider to use (github, gitlab)"
    required: false
    default: "github"

  # GitLab credentials (when source-control-provider = gitlab)
  gitlab-token:
    description: "GitLab personal access token"
    required: false
  gitlab-project-id:
    description: "GitLab project ID or path (e.g., my-group/my-project)"
    required: false
  gitlab-base-url:
    description: "GitLab instance base URL"
    required: false
    default: "https://gitlab.com"

  # Notification provider
  notification-provider:
    description: "Notification provider (github-summary, slack, teams, discord, email, webhook)"
    required: false
    default: "github-summary"
  notification-webhook-url:
    description: "Webhook URL for Slack, Teams, Discord, or generic webhook notifications"
    required: false
  sendgrid-api-key:
    description: "SendGrid API key (when notification-provider = email)"
    required: false
  email-from:
    description: "Sender email address (when notification-provider = email)"
    required: false
  email-to:
    description: "Recipient email addresses, comma-separated (when notification-provider = email)"
    required: false
  webhook-signing-secret:
    description: "HMAC-SHA256 signing secret for generic webhook notifications"
    required: false

  # Investigation parameters
  time-range:
    description: "Time range to analyze (e.g., 1h, 6h, 24h, 7d)"
    required: false
    default: "24h"
  severity-focus:
    description: "Primary focus area (errors, warnings, all)"
    required: false
    default: "errors"
  service-filter:
    description: "Service filter pattern (e.g., my-service, api-*, *)"
    required: false
    default: "*"
  investigation-depth:
    description: "How deep Claude should investigate (quick, standard, thorough)"
    required: false
    default: "standard"
  max-investigate-turns:
    description: "Maximum Claude turns for investigation phase"
    required: false
    default: "50"
  max-implement-turns:
    description: "Maximum Claude turns for implementation phase"
    required: false
    default: "30"

  # PR / branch settings
  base-branch:
    description: "Target branch for PRs (e.g., main, master, develop)"
    required: false
    default: "main"
  pr-labels:
    description: "Comma-separated list of labels to apply to created PRs"
    required: false
    default: "agent,triage,needs-review"

  # Behavior
  dry-run:
    description: "Dry run mode — analyze only, do not create PRs"
    required: false
    default: "false"
  novelty-mode:
    description: "Only report novel issues not already tracked in Linear/GitHub"
    required: false
    default: "true"
  linear-issue:
    description: "Existing Linear issue to work on (e.g., ENG-123). Skips log investigation."
    required: false
    default: ""
  additional-instructions:
    description: 'Additional instructions for Claude (e.g., "focus on the webhook handler")'
    required: false
    default: ""
  service-map-path:
    description: "Path to the service ownership map YAML file"
    required: false
    default: ".github/service-map.yml"

  # GitHub tokens
  github-token:
    description: "GitHub token for API access and PR creation"
    required: false
    default: "${{ github.token }}"
  bot-token:
    description: "Optional bot token with elevated permissions (for cross-repo dispatch, push to protected branches)"
    required: false

outputs:
  issues-found:
    description: "Whether any issues were found during investigation (true/false)"
  recommendation:
    description: "Investigation recommendation (implement, +1 existing ENG-XXX, skip)"
  issue-identifier:
    description: "Linear issue identifier (e.g., ENG-123)"
  issue-url:
    description: "Linear issue URL"
  pr-url:
    description: "URL of the created pull request"
  pr-number:
    description: "Number of the created pull request"

runs:
  using: "node20"
  main: "dist/index.js"
