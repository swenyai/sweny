name: Release Action

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify dist is current
        run: |
          npm run package --workspace=packages/action
          if [ -n "$(git status dist/ --porcelain)" ]; then
            echo "::error::dist/index.js is out of date. Run 'npm run package' and commit."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
