name: Release Action

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build providers
        run: npm run build --workspace=packages/providers

      - name: Build engine
        run: npm run build --workspace=packages/engine

      - name: Build dist
        run: npm run package --workspace=packages/action

      - name: Retag with fresh dist if changed
        run: |
          if [ -n "$(git status dist/ --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist/
            git commit -m "chore: rebuild dist for ${GITHUB_REF_NAME}"
            git tag -f "${GITHUB_REF_NAME}"
            git push origin "${GITHUB_REF_NAME}" --force
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
