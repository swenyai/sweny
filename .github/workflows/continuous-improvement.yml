name: Continuous Improvement

# SWEny runs autonomously on this repo to investigate CI failures, improve
# code quality, and open fix PRs — demonstrating the full triage loop.
#
# This is real dogfooding: the tool that builds itself.

on:
  schedule:
    - cron: "0 7 * * 1,4" # Mon & Thu at 7 AM UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run — analyze only, no PRs or issues created"
        default: "false"
        required: false
      time-range:
        description: "How far back to look (e.g. 1h, 24h, 7d)"
        default: "7d"
        required: false
      investigation-depth:
        description: "Investigation depth (quick, standard, thorough)"
        default: "thorough"
        required: false

jobs:
  improve:
    name: Autonomous Improvement
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'schedule' || github.actor == 'wickdninja'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect CI failure summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo swenyai/sweny --status failure --limit 20 \
            --json databaseId,name,createdAt,headBranch,workflowName \
          | jq '[.[] | {
              timestamp: .createdAt,
              service: "sweny-ci",
              level: "error",
              message: ("CI failure: " + .workflowName + " on " + .headBranch),
              attributes: {
                run_id: (.databaseId | tostring),
                workflow: .workflowName,
                branch: .headBranch
              }
            }]' > /tmp/ci-failures.json
          echo "Collected $(jq length /tmp/ci-failures.json) failed runs"

      - name: Run SWEny
        uses: swenyai/sweny@v3
        with:
          claude-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Observability: CI failure summary (agent uses GitHub MCP for deeper queries)
          observability-provider: file
          log-file-path: /tmp/ci-failures.json

          # Issue tracking: GitHub Issues on this repo
          # Note: GitHub MCP server is auto-injected because issue-tracker-provider is github-issues
          issue-tracker-provider: github-issues
          # GH_PAT preferred — PRs authored by a real user trigger CI.
          # Falls back to github.token (PRs won't trigger CI, but workflow won't crash).
          github-token: ${{ secrets.GH_PAT || github.token }}

          dry-run: ${{ inputs.dry-run || 'false' }}
          time-range: ${{ inputs.time-range || '7d' }}
          investigation-depth: ${{ inputs.investigation-depth || 'thorough' }}
          novelty-mode: "true"
          # Auto-merge: SWEny's fix PRs merge automatically once CI passes.
          # Requires "Allow auto-merge" enabled in repo settings + branch protection rules.
          review-mode: auto

          additional-instructions: |
            You are the autonomous improvement agent for the SWEny codebase itself.
            This is the repo that builds and ships SWEny — you are improving your own platform.

            Your primary inputs are CI failure logs, but your mandate is broader than just
            fixing broken builds. After addressing any CI failures, look at the codebase
            holistically and identify the highest-value improvement you can make:

            - Recurring CI failures: TypeScript errors, test failures, missing build steps
            - Test coverage gaps: providers or engine paths with no tests
            - Provider correctness: env var mappings, error handling, edge cases
            - Type safety: loose casts, missing types, `any` usage
            - Documentation gaps: inputs/outputs that are undocumented or misleading
            - Performance: slow build steps, redundant work in the action entrypoint

            The codebase is a TypeScript ESM monorepo (Node 22, Vitest 4):
              packages/providers  — 30+ provider implementations (observability, issue tracking,
                                    source control, notification, coding-agent, MCP, storage)
              packages/engine     — workflow runner (WorkflowDefinition DAG, Learn → Act → Report)
                                    Key exports: runWorkflow, createWorkflow, validateWorkflow
              packages/action     — GitHub Action entrypoint (dist/index.js via ncc)
              packages/agent      — Slack bot + CLI AI assistant (Claude Code SDK)
              packages/cli        — sweny CLI: triage, implement, check, workflow run/validate/list/export
              packages/studio     — React component library: WorkflowViewer DAG visualization

            Build order matters: providers must build before engine, engine before cli/agent/action.
            Run `npm run build --workspace=packages/providers` before typechecking engine.

            Security: the last push reported 8 Dependabot vulnerabilities (3 high, 4 moderate, 1 low).
            If CI logs don't show a clear target, investigate the security advisories via GitHub MCP
            and fix any that are in published packages or the action runtime.

            Prioritize a single high-confidence, well-scoped fix. Open a clean PR with a
            clear description so the team can review and merge it quickly.
