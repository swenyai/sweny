name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate: build + test must pass before we publish OR move the v5 action tag.
  # Kept as its own job so a publish-credential failure (which is NOT a code
  # failure) does not block the v5 tag from advancing, and so tag-action can
  # tell "code is good" from "publish failed".
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: |
          npm run build --workspace=packages/core
          npm run build:lib --workspace=packages/studio
          npm run build --workspace=packages/mcp
      - name: Test
        run: npm run test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      id-token: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build
        run: |
          npm run build --workspace=packages/core
          npm run build:lib --workspace=packages/studio
          npm run build --workspace=packages/mcp

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'release-*' 2>/dev/null || echo "")
          DIFF_BASE=${LAST_TAG:-$(git rev-list --max-parents=0 HEAD)}

          CHANGED_CORE=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/core/ | head -1)
          CHANGED_STUDIO=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/studio/ | head -1)
          CHANGED_MCP=$(git diff --name-only "$DIFF_BASE"..HEAD -- packages/mcp/ | head -1)

          PUBLISHED=false

          # Version selection:
          #  - local strictly ahead of npm  -> publish LOCAL as-is (honors a
          #    deliberate minor/major bump set in package.json).
          #  - local behind-or-equal to npm -> cut npm+1 patch. This is the
          #    stale/already-taken case and also the race where a prior Release
          #    run published to npm but its post-publish git push lost to a
          #    concurrent merge, leaving main's package.json behind npm. Without
          #    it the next run would retry an already-published version and 403.
          bump_and_publish() {
            local pkg_dir="$1"
            local pkg_name="$2"
            cd "$pkg_dir"
            local LOCAL_VER NPM_VER HIGHER NEXT
            LOCAL_VER=$(node -p "require('./package.json').version")
            NPM_VER=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")
            HIGHER=$(printf '%s\n%s\n' "$LOCAL_VER" "$NPM_VER" | sort -V | tail -1)
            if [ "$LOCAL_VER" = "$HIGHER" ] && [ "$LOCAL_VER" != "$NPM_VER" ]; then
              # local > npm: a deliberate version; publish exactly what is set.
              echo "Publishing local version $LOCAL_VER for $pkg_name (ahead of npm $NPM_VER)"
            else
              # local <= npm: stale/taken; cut npm+1 patch so we never 403 a
              # version already on the registry nor republish a behind version.
              NEXT=$(echo "$NPM_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
              npm version "$NEXT" --no-git-tag-version
            fi
            # Surface which package failed (the failure alert links the run, but
            # the annotation names the package). bash runs with -eo pipefail, so
            # a bare failure would still abort; this just makes it legible.
            npm publish || { echo "::error::npm publish failed for $pkg_name@$(node -p "require('./package.json').version")"; return 1; }
            echo "Published $pkg_name@$(node -p "require('./package.json').version")"
            cd - > /dev/null
          }

          if [ -n "$CHANGED_CORE" ]; then
            bump_and_publish packages/core "@sweny-ai/core"
            PUBLISHED=true
          fi

          if [ -n "$CHANGED_STUDIO" ]; then
            bump_and_publish packages/studio "@sweny-ai/studio"
            PUBLISHED=true
          fi

          if [ -n "$CHANGED_MCP" ]; then
            bump_and_publish packages/mcp "@sweny-ai/mcp"
            PUBLISHED=true
          fi

          if [ "$PUBLISHED" = true ]; then
            git add -A
            git commit -m "chore: release packages [skip ci]"
            # Rebase onto any commits that landed during build/test/publish.
            # Without this, a concurrent dependabot merge causes "fetch first"
            # rejection and main is left with package.json behind npm.
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "push rejected, attempt $attempt — pulling and retrying"
              git pull --rebase origin main
            done
          fi

      - name: Advance release-latest diff base
        # release-latest is the diff base for change detection on the next run,
        # so it MUST only move on a successful publish (default if: success()).
        # If publish failed, the base stays put and the next run still sees the
        # unpublished changes.
        run: |
          git tag -f "release-latest"
          git push origin "release-latest" --force

      - name: Alert on release failure
        # The publish failure that motivated this job split went unnoticed for
        # two weeks because nothing alerted. Open (or comment on) a GitHub issue
        # so it is visible. No external secret required.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TITLE="Release workflow failing"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="Release publish failed for commit ${{ github.sha }}. Run: ${RUN_URL}. Common cause: an expired or revoked NPM_TOKEN (npm publish returns E404 on an existing scoped package)."
          NUM=$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi

  tag-action:
    name: Tag v5 action pointer
    runs-on: ubuntu-latest
    # Runs after publish for ordering, but advances the v5 tag whether or not
    # publish succeeded — the composite action.yml is independent of the npm
    # publish. Skipped only if the build/test gate failed or the run was
    # cancelled. This is what keeps a publish-credential blip from freezing
    # every swenyai/sweny@v5 consumer.
    needs: [verify, publish]
    if: ${{ !cancelled() && needs.verify.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Latest main, so we tag the publish bump commit when publish ran.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Tag v5 moving tag and immutable v5.<core-version>
        run: |
          # The root action.yml is a composite action — no JS bundle to build.
          # Just move the v5 tag forward so consumers pinned to swenyai/sweny@v5
          # always get the latest engine wrapper, and cut an immutable
          # v5.<core_version> for anyone who wants to pin precisely.
          git tag -f v5
          git push origin v5 --force

          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          VERSIONED_TAG="v5.${CORE_VERSION}"
          # Only cut the immutable tag if it does not already exist (it will
          # when publish was skipped/failed and core's version is unchanged).
          if git rev-parse -q --verify "refs/tags/$VERSIONED_TAG" >/dev/null; then
            echo "$VERSIONED_TAG already exists, leaving it untouched"
          else
            git tag "$VERSIONED_TAG"
            git push origin "$VERSIONED_TAG"
            echo "Pushed $VERSIONED_TAG"
          fi
