name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build providers
        run: npm run build --workspace=packages/providers

      - name: Build core
        run: npm run build --workspace=packages/core

      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build providers
        run: npm run build --workspace=packages/providers

      - name: Build core
        run: npm run build --workspace=packages/core

      - run: npm run test

  smoke-test:
    name: Smoke — providers load without peer deps
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build providers
        run: npm run build --workspace=packages/providers

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Remove optional peer deps from node_modules
        run: |
          rm -rf node_modules/@aws-sdk
          rm -rf node_modules/@modelcontextprotocol
          rm -rf node_modules/@slack
          rm -rf node_modules/@actions

      - name: Verify package loads without peer deps
        run: |
          node --input-type=module <<'EOF'
          import('./packages/providers/dist/index.js')
            .then(() => { console.log('✓ @sweny-ai/providers loads without peer deps'); })
            .catch((err) => { console.error('✗', err.message); process.exit(1); });
          EOF
