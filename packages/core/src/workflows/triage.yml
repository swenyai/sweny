id: triage
name: Alert Triage
description: Investigate a production alert, determine root cause, create an issue, implement a fix, and notify the team
entry: gather
nodes:
  gather:
    name: Gather Context
    instruction: >-
      You are investigating a production alert. Gather all relevant context using the available tools:


      1. **Observability**: Pull error details, stack traces, recent logs, metrics, and active incidents around the time
      of the alert. Use whichever observability tools are available to you.

      2. **Source control**: Check recent commits, pull requests, and deploys that might be related.

      3. **Issue tracker**: Search for similar past issues or known problems.


      Be thorough — the investigation step depends on complete context. Use every tool available to you.
    skills:
      - github
      - sentry
      - datadog
      - betterstack
      - linear
  investigate:
    name: Root Cause Analysis
    instruction: >-
      Based on the gathered context, classify every distinct issue you found into one of two buckets: **novel** or
      **duplicate**.


      For EACH issue found:

      1. Identify the root cause and affected code/service.

      2. Assess severity: critical (service down), high (major feature broken), medium (degraded), low (cosmetic/minor).

      3. Assess fix complexity: "simple" (a few lines, clear change), "moderate" (multiple files but well-understood),
      or "complex" (architectural, risky, or unclear).

      4. **Novelty check (REQUIRED — you MUST call tools for this step):** Filing a duplicate ticket is worse
      than under-reporting — the team inherits sprawl that humans have to clean up later. Complete EVERY step
      below before classifying anything as novel. Do NOT skip these searches even if the gather context already
      mentions existing issues or branches — you must verify independently.

      4a. **Search broadly — THIS REQUIRES TOOL CALLS.** You MUST call `linear_search_issues` (or
      `github_search_issues`) with multiple queries against the issue tracker (BOTH open AND closed): the
      affected file or module path, the error message or log string verbatim, the feature or service name,
      and the symptom family (e.g. "startup crash", "data dropped silently"). Do not rely on a single
      keyword — a narrow search is how duplicates slip through. If you skip this search, the verify check
      will fail.

      4b. **Read the full body of every promising candidate — do NOT match on title alone.** For each top match,
      open the issue and read its entire description, including any "Recommended Fix", "Proposed Fix", "Action
      Items", or "Acceptance Criteria" section. An existing open issue whose recommended fix already prescribes
      the change you were about to propose IS a duplicate, even if the symptom you just observed is a new
      instance of the same underlying bug.

      4c. **Check for meta-issues and bug families.** If an existing ticket names a pattern that your finding is
      another instance of (same root cause, same function/module, different input or caller), treat your finding
      as a sibling of that family and comment on the existing ticket. Do not file a parallel ticket per instance
      — that is the exact pattern that produces backlog sprawl.

      4d. **When uncertain, comment don't file.** If you are less than ~80% confident a finding is truly novel
      after steps 4a–4c, classify it as a duplicate and add a "+1 — another instance" comment to the closest
      existing issue with the new context. Over-reporting duplicates is cheap; ticket sprawl is expensive.

         - If matched → **duplicate**. Record the existing issue ID in `duplicate_of`.
         - If no match after 4a–4d → **novel**.

      **Output rules:**

      - `findings`: array of ALL issues found (both novel and duplicate).

      - `novel_count`: how many findings are novel (not duplicates).

      - `highest_severity`: the highest severity across ALL findings.

      - `recommendation`: what should happen next.


      Downstream nodes will act ONLY on novel findings. Duplicates will be +1'd automatically.


      **IMPORTANT — scope boundaries for this node:**

      - DO NOT create issues (Linear, GitHub, or any tracker). A downstream `create_issue` node handles that.

      - DO NOT create branches, commits, or pull requests. A downstream `implement` node handles that.

      - DO NOT call any write tools (`linear_create_issue`, `github_create_issue`,
      `github_create_pr`, `linear_add_comment`, `github_add_comment`, etc.).
      Downstream nodes handle all writes — issue creation, +1 comments, and PRs.

      - Your ONLY job is read, search, classify, and output. If you create an issue
      or add a comment here, the downstream verify check will fail or duplicate work.
    skills:
      - github
      - linear
    verify:
      # The novelty check REQUIRES searching the issue tracker. If the node finishes
      # with 0 search tool calls, it means the agent skipped the novelty check entirely
      # and any "novel" classification is unreliable.
      any_tool_called:
        - linear_search_issues
        - github_search_issues
    output:
      type: object
      properties:
        findings:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: Short description of the issue
              root_cause:
                type: string
              severity:
                type: string
                enum:
                  - critical
                  - high
                  - medium
                  - low
              affected_services:
                type: array
                items:
                  type: string
              is_duplicate:
                type: boolean
              duplicate_of:
                type: string
                description: Existing issue ID/URL if duplicate
              fix_approach:
                type: string
              fix_complexity:
                type: string
                enum:
                  - simple
                  - moderate
                  - complex
            required:
              - title
              - root_cause
              - severity
              - is_duplicate
        novel_count:
          type: number
          description: Count of novel (non-duplicate) findings
        highest_severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        recommendation:
          type: string
      required:
        - findings
        - novel_count
        - highest_severity
        - recommendation
  create_issue:
    name: Create Issues & Triage Duplicates
    instruction: >-
      Process ALL findings from the investigation. The findings array contains both novel and duplicate issues.


      **For each NOVEL finding** (is_duplicate = false):

      1. **First, check if a prior triage run already created an issue for this exact bug.** Call
      `linear_search_issues` (or `github_search_issues`) with the error message or root cause.
      If a matching issue already exists with the same root cause:
         - Treat it as a duplicate: DO NOT create a new issue.
         - Populate `issueIdentifier`, `issueTitle`, and `issueUrl` from the existing issue.
         - Add a "+1" comment if appropriate (using `linear_add_comment` or `github_add_comment`).
         - Set the `action` to `updated` in the `issues` array.
         - This prevents duplicate tickets when the same alert fires multiple times.

      2. If no matching issue exists, create a new one with a clear, actionable title by invoking
      `linear_create_issue` or `github_create_issue`. You MUST actually call the tool — do NOT
      synthesize an identifier from an alert ID, commit SHA, or your own imagination. If the
      tool errors, stop and report the failure; do not invent a fallback identifier.
      **Use the exact tool names above** — do NOT use generic alternatives like `create_issue`
      or `create_pull_request` from ToolSearch. The verify check requires the specific tool
      names listed here.

      3. Include: root cause, severity, affected services, reproduction steps, and recommended fix.

      4. Add appropriate labels (bug, severity level, affected service).

      5. Link to relevant commits, PRs, or existing issues.

      6. Copy the identifier returned by the tool verbatim into the `issueIdentifier` output
      field. The identifier must match `^[A-Z][A-Z0-9]*-\d+$` (e.g. `OFF-1234`) — do not
      prefix it with anything else.


      **For each DUPLICATE finding** (is_duplicate = true):

      1. Find the existing issue (check duplicate_of field).

      2. Check the issue's comments — if the most recent comment is already from SWEny (contains "+1") within the last
      24 hours, skip adding another comment.

      3. Otherwise add a SHORT comment: "+1 — seen again {UTC timestamp}. {one sentence of new context}." (Keep it under
      2 lines. No markdown headers, no emoji, no formatting.)

      4. If the existing issue is closed/done, reopen it.


      If context.issueTemplate is provided, use it as the format for new issue bodies. Otherwise use a clear structure
      with: Summary, Root Cause, Impact, Steps to Reproduce, and Recommended Fix.


      Use the issue tracker specified in context (e.g. Linear, Jira, or GitHub Issues) — do NOT fall back to a
      different tracker. Output the created/updated issue identifiers.


      **IMPORTANT — scope boundaries for this node:**

      - DO NOT create branches, commits, or pull requests. The `implement` and `create_pr` nodes handle that.

      - DO NOT call `create_pull_request`, `github_create_pr`, or any PR/branch tools.

      - Your job is issue creation and duplicate management ONLY.
    skills:
      - linear
      - github
    verify:
      # Require a real issue-tracker tool call. linear_create_issue / github_create_issue
      # for novel findings; linear_search_issues / github_search_issues for duplicate-check
      # when the issue already exists from a prior triage run. linear_add_comment covers
      # the +1 path for duplicates.
      any_tool_called:
        - linear_create_issue
        - github_create_issue
        - linear_search_issues
        - github_search_issues
        - linear_add_comment
        - github_add_comment
    output:
      type: object
      properties:
        issueIdentifier:
          type: string
          pattern: '^[A-Z][A-Z0-9]*-\d+$'
          description: >-
            Primary issue identifier (e.g. OFF-1234). MUST be the identifier returned by
            `linear_create_issue` / `github_create_issue` — do NOT invent a value from a
            Sentry short-ID or commit SHA. Used by downstream nodes for branch naming and
            PR linking.
        issueTitle:
          type: string
          description: Title of the primary issue created
        issueUrl:
          type: string
          pattern: "^https?://"
          description: URL of the primary issue created, as returned by the create-issue tool
        issues:
          type: array
          minItems: 1
          description: All issues created or updated during this step
          items:
            type: object
            properties:
              identifier:
                type: string
              title:
                type: string
              url:
                type: string
              action:
                type: string
                enum:
                  - created
                  - updated
                  - reopened
            required:
              - identifier
              - action
      required:
        - issueIdentifier
        - issueTitle
        - issueUrl
        - issues
    retry:
      max: 1
      instruction:
        auto: true
  skip:
    name: Skip — All Duplicates or Low Priority
    instruction: >-
      Every finding from the investigation was either a duplicate or low-priority. No new issues need to be created.


      For each **duplicate** finding (check the findings array for items where is_duplicate = true):

      1. Find the existing issue (check duplicate_of field).

      2. Check the issue's comments — if the most recent comment is already from SWEny (contains "+1") within the last
      24 hours, skip adding another comment.

      3. Otherwise add a SHORT comment: "+1 — seen again {UTC timestamp}. {one sentence of new context}." (Keep it under
      2 lines. No markdown headers, no emoji, no formatting.)

      4. If the issue is closed/done, reopen it.


      For **low priority** findings, log a brief note about why they were skipped.
    skills:
      - linear
      - github
  implement:
    name: Implement Fix
    instruction: |-
      Implement the fix identified during investigation, plus the tests that pin
      it as a regression guard. The issue created in the previous step is in your
      context — use its identifier for branch naming and commit messages.

      ## Quality bar (non-negotiable)

      Every change you make must clear all of these. If you cannot, STOP and
      return a failed status — do not ship a half-measure.

      - **Correctness**: the fix actually closes the failure mode in the issue.
      - **Completeness**: handles the obvious edge cases (nulls, empties, off-by-one,
        concurrent paths). If the issue lists multiple symptoms, address them all
        or explicitly state which are out of scope and why.
      - **Idiomatic for THIS repo, not in general.** Read at least one
        neighboring file in the same module before you write any code, and
        match the patterns you see: error-handling primitives the codebase
        already uses, type discipline, naming, file layout. Examples to make
        the shape concrete:
        - In a NestJS service, throwing `NotFoundException` /
          `BadRequestException` is idiomatic; `throw new Error(...)` is not.
        - In a Go service, returning a wrapped `fmt.Errorf("...: %w", err)`
          beats panicking.
        - In a TypeScript repo, narrow types properly — do not `as any` past
          the type checker.
        These are illustrations. Generalize: whatever the repo already does,
        keep doing.
      - **No hacky shortcuts**: no `try/catch` to swallow errors, no commented-out
        guards, no `// TODO: revisit`, no global flags to bypass validation, no
        copy-pasted bodies. If the right fix needs a small refactor (e.g. extract
        a helper), do it; if it needs a large refactor, file a follow-up issue
        and ship the minimal correct fix without the refactor.
      - **Well-tested**: see Test Requirements below.

      ## Steps

      0. **Precondition — verify context.create_issue.issueIdentifier is well-formed.**
         The identifier MUST match `^[A-Z][A-Z0-9]*-\d+$` (e.g. `OFF-1234`). If it
         is missing, empty, or matches a Sentry short-ID / slug / any other shape,
         STOP immediately — do NOT invent a branch name from the Sentry event,
         commit SHA, or alert payload. Return a failed status with a clear message
         instead; the workflow will route to notify and a human will pick it up.

      1. Create a feature branch from the base branch (check context for
         baseBranch, default `main`). **Branch name MUST include the issue
         identifier** exactly as provided in `context.create_issue.issueIdentifier`.
         Format: lowercase the identifier and use it as a prefix, e.g.
         `off-1234-fix-null-check`. If the repository uses a different branch
         convention (check context.branchPattern or the rules/CLAUDE.md for a
         regex), follow that — but the identifier piece MUST still come from
         `context.create_issue.issueIdentifier`, never from a Sentry short-ID.

      2. Read the relevant source files to understand the current code AND read
         the nearest existing test file (e.g. `foo.service.spec.ts` next to
         `foo.service.ts`, or `foo_test.py` next to `foo.py`) so your new tests
         match the existing test conventions: framework, mock style, factory use,
         describe/it shape, naming.

      3. Make the necessary code change. Keep it minimal and focused — do not
         refactor surrounding code or add unrelated improvements.

      4. **Write tests for the fix.** See Test Requirements below.

      5. **Run the test suite for the affected package** and confirm green
         (the package's `test` command from package.json, `pytest` for Python,
         etc.). If the test runner is not obvious, read the project's
         CLAUDE.md / README / package.json scripts. If you cannot run the
         tests at all in this environment, say so explicitly in the output —
         do not claim "tests pass" when you didn't run them.

      6. Stage and commit with a clear commit message. Start the message with the
         issue identifier in brackets, e.g.
         `[OFF-1234] fix: guard null projectId before database lookup`.

      ## Test Requirements

      A code change without a test is unfinished work. Every fix this node ships
      MUST come with at least one new test case that:

      - **Would fail on the unfixed code.** A test that passes both before and
         after the fix is decoration, not a regression guard. Mentally run it
         against the previous version; if it would have passed, it is not the
         right test.
      - **Asserts the user-facing contract**, not just an implementation
         detail. For an API/handler bug: assert the response shape, status code,
         or error type the client sees. For a data corruption bug: assert the
         persisted row's final state, not just an internal call count.
      - **Covers the obvious adjacent edge cases.** If the bug was "throws plain
         Error on missing record", add the missing-record case AND at least one
         success-path case to confirm the fix didn't break the happy path.
      - **Lives in the right file** (next to the source under test, in the
         project's existing test layout).

      The verify gate on this node REQUIRES `test_status` to be either
      `pass` (tests ran and all passed) OR `no-framework` (the project
      genuinely has no test runner — not "I couldn't be bothered").

      If the project HAS a test framework, you must write tests and they
      must pass. Empty `test_files_changed` with `test_status: pass` is a
      lie and verify will reject it via the schema's required-fields
      contract; `not-run` and `fail` will retry once with reflection and
      then halt for human attention.

      If the fix turns out to be more complex than expected, stop and
      explain why — do not force a bad fix.
    skills:
      - github
    output:
      type: object
      properties:
        branch:
          type: string
          description: Feature branch name (must include the issue identifier).
        commit_sha:
          type: string
          description: SHA of the commit shipping the fix and tests.
        files_changed:
          type: array
          description: Source files modified by the fix (NOT including test files).
          items:
            type: string
        test_files_changed:
          type: array
          description: |
            Test files added or modified to cover the fix. Should be
            non-empty whenever `test_status: pass`. May be empty when
            `test_status: no-framework` (genuinely no test runner in
            the repo).
          items:
            type: string
        test_command:
          type: string
          description: Exact command run to validate (e.g. `npx nx test server`).
        test_status:
          type: string
          enum: [pass, fail, no-framework, not-run]
          description: |
            Outcome of running the test suite.
            - `pass` — tests ran end-to-end and every assertion passed.
              `test_files_changed` MUST be non-empty in this case (you
              changed code; tests must cover it).
            - `no-framework` — the repo genuinely has no test runner
              (e.g. a docs-only repo, a YAML-config repo, a research
              notebook collection). Reserved for cases where there is
              no test infrastructure to extend — not a permission slip
              to skip tests in a normal codebase.
            - `fail` — tests ran and at least one failed. Do not push
              a broken fix. Return this status, retry will fire once.
            - `not-run` — tests exist but the environment couldn't
              execute them. Explain in `test_notes`. Retry will fire.
        test_notes:
          type: string
          description: One-paragraph explanation of which tests were added and what they assert.
      required:
        - branch
        - commit_sha
        - files_changed
        - test_files_changed
        - test_status
    verify:
      # `pass` and `no-framework` both clear the gate. `fail` and `not-run`
      # trigger retry. The instruction text + schema's required-fields list
      # are the contract that prevents `pass` with empty `test_files_changed`
      # — verify cannot express that conditional declaratively.
      output_matches:
        - path: test_status
          in: [pass, no-framework]
    retry:
      max: 1
      instruction:
        auto: true
  create_pr:
    name: Open Pull Request
    instruction: >-
      Open a pull request for the fix. The issue identifier and URL are in your context from the create_issue step.


      1. Push the branch to the remote.

      2. Create the PR using the `github_create_pr` tool. **Use this exact tool name** — do NOT
      use `create_pull_request` or any other variant from ToolSearch. The verify check requires
      `github_create_pr` specifically.

      3. PR title MUST start with the issue identifier in brackets.
      Format: `[{context.create_issue.issueIdentifier}] fix: {short description}`.

      4. In the PR body, include: summary of the bug, what the fix does, and a link to the issue
      (context.create_issue.issueUrl). If the investigation found a Sentry issue, include "Fixes {sentryShortId}"
      in the PR body so Sentry auto-resolves on merge.

      5. Add appropriate labels if available.


      If context.prTemplate is provided, use it as the format for the PR body. Otherwise use a clear structure with:
      Summary, Changes, Testing, and Related Issues.


      If context.cloudRunId is provided, append this HTML comment to the end of the PR body: <!--
      sweny:run_id:{context.cloudRunId} -->


      Return the PR URL and number.
    skills:
      - github
    verify:
      any_tool_called:
        - github_create_pr
    retry:
      max: 1
      instruction:
        auto: true
  notify:
    name: Notify Team
    instruction: |-
      Send a notification summarizing the triage result:

      1. Include: alert summary, severity, root cause (1-2 sentences), and links to any created issues or PRs.
      2. For critical/high severity, make the notification urgent.
      3. For medium/low, a standard notification is fine.

      Use whichever notification channel is available to you.
    skills:
      - slack
      - notification
edges:
  - from: gather
    to: investigate
  - from: investigate
    to: create_issue
    when: novel_count is greater than 0 AND highest_severity is medium or higher
  - from: investigate
    to: skip
    when: novel_count is 0, OR highest_severity is low
  - from: create_issue
    to: implement
    when: at least one novel finding has fix_complexity simple or moderate AND fix_approach is provided
  - from: create_issue
    to: notify
    when: all novel findings have fix_complexity complex, OR no clear fix_approach
  - from: skip
    to: notify
  - from: implement
    to: create_pr
  - from: create_pr
    to: notify
