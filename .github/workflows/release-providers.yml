name: Release @sweny/providers

on:
  push:
    tags:
      - "providers-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Build providers
        run: npm run build --workspace=packages/providers

      - name: Typecheck
        run: npm run typecheck --workspace=packages/providers

      - name: Test
        run: npm run test --workspace=packages/providers

      - name: Publish
        run: npm publish --access public --workspace=packages/providers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
