name: Release Worker

on:
  push:
    branches: [main]
    paths:
      - "packages/worker/**"
      - "packages/shared/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build worker
        run: npm run build --workspace=packages/worker

      - name: Generate standalone package-lock.json for Docker
        run: |
          # Build context is packages/worker/ — generate a lock file that resolves
          # @sweny-ai/* from the npm registry (not monorepo file: paths) so that
          # `npm ci --production` inside the Docker build works correctly.
          tmpdir=$(mktemp -d)
          cp packages/worker/package.json "$tmpdir/"
          cd "$tmpdir"
          npm install --package-lock-only --ignore-scripts
          cp package-lock.json "$GITHUB_WORKSPACE/packages/worker/"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/swenyai/worker
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.sha.outputs.short }}
          labels: |
            org.opencontainers.image.title=sweny-worker
            org.opencontainers.image.description=SWEny open-source job executor
            org.opencontainers.image.source=https://github.com/swenyai/sweny
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/worker
          file: packages/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/swenyai/worker:${{ steps.sha.outputs.short }}
          output-file: worker-sbom.spdx.json
          format: spdx-json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: worker-${{ steps.sha.outputs.short }}
          name: worker-${{ steps.sha.outputs.short }}
          generate_release_notes: true
          files: worker-sbom.spdx.json
          body: |
            ## Docker image

            ```
            docker pull ghcr.io/swenyai/worker:${{ steps.sha.outputs.short }}
            ```

            **Digest:** `${{ steps.build.outputs.digest }}`

            **Platforms:** `linux/amd64`, `linux/arm64`

            ## Verify

            ```sh
            ./verify-build.sh ghcr.io/swenyai/worker:${{ steps.sha.outputs.short }} ${{ steps.sha.outputs.short }}
            ```
