name: "SWEny — E2E Agent Suite"
description: "Run an agentic end-to-end test workflow against a deployed app. Installs agent-browser, runs your workflow, and uploads screenshots."
author: "SWEny"

branding:
  icon: "check-circle"
  color: "orange"

inputs:
  workflow:
    description: "Path to the E2E workflow YAML file to execute (relative to working-directory)."
    required: true

  claude-oauth-token:
    description: "Claude Code OAuth token. Use this OR anthropic-api-key. OAuth tokens do not consume API credit."
    required: false
  anthropic-api-key:
    description: "Anthropic API key for Claude. Use this OR claude-oauth-token."
    required: false

  base-url:
    description: "Base URL of the deployed app under test. Exposed to the workflow as BASE_URL."
    required: false

  cli-version:
    description: "Version of @sweny-ai/core to install (the package that ships the `sweny` CLI). Defaults to latest."
    required: false
    default: "latest"

  agent-browser-version:
    description: "Version of agent-browser to install. Defaults to latest."
    required: false
    default: "latest"

  node-version:
    description: "Node.js version to install."
    required: false
    default: "24"

  working-directory:
    description: "Working directory to run the workflow from. Defaults to the repository root."
    required: false
    default: "."

  screenshots-path:
    description: "Path (relative to working-directory) where the workflow writes screenshots and artifacts. Uploaded after the run."
    required: false
    default: "results/"

  artifact-name:
    description: "Name of the uploaded screenshots artifact."
    required: false
    default: "e2e-screenshots"

  artifact-retention-days:
    description: "How long to retain the screenshots artifact (days)."
    required: false
    default: "14"

runs:
  using: "composite"
  steps:
    - name: Validate auth inputs
      shell: bash
      env:
        HAS_OAUTH: ${{ inputs.claude-oauth-token != '' }}
        HAS_API_KEY: ${{ inputs.anthropic-api-key != '' }}
      run: |
        if [ "$HAS_OAUTH" != "true" ] && [ "$HAS_API_KEY" != "true" ]; then
          echo "::error::Either claude-oauth-token or anthropic-api-key must be provided"
          exit 1
        fi

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install SWEny CLI and agent-browser
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
        AGENT_BROWSER_VERSION: ${{ inputs.agent-browser-version }}
      run: |
        npm install -g \
          "@sweny-ai/core@${CLI_VERSION}" \
          "agent-browser@${AGENT_BROWSER_VERSION}"
        agent-browser install

    - name: Run E2E workflow
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-oauth-token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        BASE_URL: ${{ inputs.base-url }}
        WORKFLOW_PATH: ${{ inputs.workflow }}
      run: sweny workflow run "$WORKFLOW_PATH"

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-${{ github.run_id }}
        path: ${{ inputs.working-directory }}/${{ inputs.screenshots-path }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.artifact-retention-days }}
